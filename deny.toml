[graph]
all-features = true
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
ignore = []

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "MIT",
    "PDDL-1.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path-only dev-dependencies on unpublished workspace fixtures are validated
# by scripts/check-package-inventory.sh and intentionally omit a version.
allow-wildcard-paths = true
highlight = "all"
skip = [
    { crate = "winnow@0.7.15", reason = "toml 0.9 currently pulls winnow 0.7 while toml_parser pulls 1.0" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
