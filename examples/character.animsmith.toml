# Worked example: a game character's animation contract expressed as an
# animsmith config — loop declarations for the locomotion rings, the
# seam cap, and gait-coherence groups. Pairs with docs/embedding.md.
#
#   animsmith lint --config examples/character.animsmith.toml character.glb

[rig]
profile = "auto" # or a named profile / inline [rig.roles]

[checks.loop-seam]
max_ratio = 1.6

[checks.frozen-bone]
min_rotation_deg = 0.5

# Example severity override: demote a warning to a note while a known
# upstream issue is being fixed at the source.
[checks.quat-flip]
severity = "note"

[clips."run_*"]
loop = true

[clips."walk_*"]
loop = true

[clips.idle_1h]
loop = true

[groups.run-ring]
clips = [
    "run_forward_1h", "run_backward_1h", "run_left_1h", "run_right_1h",
    "run_forward_left_1h", "run_forward_right_1h",
    "run_backward_left_1h", "run_backward_right_1h",
]
max_gait_phase_spread = 0.15
min_lr_amplitude_m = 0.03

[groups.walk-ring]
clips = [
    "walk_forward_1h", "walk_backward_1h", "walk_left_1h", "walk_right_1h",
    "walk_forward_left_1h", "walk_forward_right_1h",
    "walk_backward_left_1h", "walk_backward_right_1h",
]
max_gait_phase_spread = 0.15
min_lr_amplitude_m = 0.03
