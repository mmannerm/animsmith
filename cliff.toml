# git-cliff config — drives auto-versioning and release notes for the CI
# release job. See https://git-cliff.org/docs/configuration for the full
# reference.
#
# Bump policy (matches the user's stated rule "one feat outranks any
# number of fixes since the last tag"):
#   - any breaking change (`!` or BREAKING CHANGE footer) → major
#   - any `feat:` since the last tag                       → minor
#   - else any `fix:` / `perf:`                            → patch
#   - else                                                 → no release

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true

[changelog]
header = ""
# Body is just the grouped per-type sections (### Features / ### Bug
# Fixes / etc.). No top-level `## <version>` heading — GitHub renders
# the Release tag/title above the body, so a duplicate version header
# inside the body is redundant. (Previously the body started with
# `## Unreleased` when --tag wasn't passed; the release workflow now
# always passes --tag and the version line was just noise.)
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.conv.description | default(value=commit.message) | upper_first }} ({{ commit.id | truncate(length=7, end="") }})\
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
# Don't drop unconventional commits — they still count as "no-bump"
# noise so the version job can decide release=false correctly. They're
# filtered out of the notes via `commit_parsers` below.
filter_unconventional = false
# Only consider tags shaped like our Release tags (v1.2.3). Stops
# git-cliff from treating any arbitrary tag a developer might create
# locally as a release boundary.
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
# Sort commits within each release section: feat > fix > perf > others.
sort_commits = "newest"
# No preprocessors. Previously this stripped the conventional-commit
# prefix from commit.message before parsing, but that meant
# `commit_parsers` below couldn't match any `^feat`/`^fix`/etc. — every
# commit hit the catchall and `--bumped-version` produced no bump even
# when fix: commits existed since the last tag. The body template now
# uses `commit.conv.description` (the parsed CC description without the
# prefix) instead, so the cosmetic concern is handled at render time.
commit_preprocessors = []

# Commit type → notes section. Anything not matched here (`chore:`,
# `ci:`, `docs:`, `style:`, `refactor:`, `test:`, build/Merge/etc.) is
# `skip = true` so it doesn't appear in the changelog body — but it
# still influences the bump decision (a release with only chores
# yields no bump, exactly what we want).
commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^revert",   group = "Reverts" },
  { message = "^chore",    skip = true },
  { message = "^ci",       skip = true },
  { message = "^docs",     skip = true },
  { message = "^style",    skip = true },
  { message = "^refactor", skip = true },
  { message = "^test",     skip = true },
  { message = "^build",    skip = true },
  { message = "^Merge",    skip = true },
  # Anything left unmatched also gets dropped from the notes; bump
  # logic still sees it as a non-bumping commit.
  { message = ".*",        skip = true },
]
