# release-plz configuration — https://release-plz.dev/docs/config
#
# Drives the automated release flow in .github/workflows/release-plz.yml,
# which replaces the bespoke git-cliff version-computation + manual
# version-alignment logic previously in main.yml (see #37).

[workspace]
# Changelog uses release-plz's default Keep-a-Changelog format (versioned
# `## [X.Y.Z]` sections with dates + release links), derived from the
# Conventional Commit history. The accepted commit types are defined in
# .commitlintrc.yml (enforced by lint-pr.yml).

# Publish only when a release-plz PR is merged — not on every push to
# main. This matches the documented flow (open a release PR, review it,
# merge to publish); with the default `true`, the release job would run
# publish logic on every main-branch commit.
release_always = false

# One repo-level git tag + GitHub Release for the whole workspace, named
# `vX.Y.Z` — not the per-package `<crate>-v<version>` names release-plz
# defaults to when more than one crate is public. Disabled here and
# re-enabled on the `animsmith` package below. This is the tag form that
# RELEASING.md, issue #37, and scripts/check-schema-id.sh all assume.
git_tag_enable = false
git_release_enable = false

# The five crates ship as one unit at a single shared version
# (`version.workspace = true`). `version_group` forces one version across
# the whole group — the highest next-version among them.
#
# Changelog ownership: only the top-level `animsmith` crate writes the
# single root CHANGELOG.md; it folds the four libraries' entries in via
# `changelog_include`. The libraries set `changelog_update = false` — if
# every crate wrote to the shared CHANGELOG.md, each would append its own
# copy of the (shared) history, duplicating it five times.

[[package]]
name = "animsmith-core"
version_group = "animsmith"
changelog_update = false

[[package]]
name = "animsmith-gltf"
version_group = "animsmith"
changelog_update = false

[[package]]
name = "animsmith-fbx"
version_group = "animsmith"
changelog_update = false

[[package]]
name = "animsmith-report"
version_group = "animsmith"
changelog_update = false

[[package]]
name = "animsmith"
version_group = "animsmith"
changelog_path = "CHANGELOG.md"
changelog_include = [
    "animsmith-core",
    "animsmith-gltf",
    "animsmith-fbx",
    "animsmith-report",
]
# The one crate that carries the workspace's single `vX.Y.Z` tag and
# GitHub Release (tags/releases are disabled workspace-wide above), and
# the one that owns CHANGELOG.md. crates.io publishing of all five crates
# is unaffected — that is the separate `publish` field, left at default.
git_tag_enable = true
git_release_enable = true
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
