name: main

# Post-merge pipeline (mirrors the rauta setup, minus dist binaries):
# re-run the full test matrix on main, then compute the next semver
# from the Conventional Commits since the last release (git-cliff) and
# publish a GitHub Release when the commits warrant one.
#
# Bump policy (cliff.toml): breaking → major, feat → minor, fix/perf →
# patch, anything else → no release.
#
# Bootstrap: the first release (v0.1.0) is published by hand; the
# version job refuses to auto-publish until one exists.
#
# crates.io publishing is intentionally NOT automated yet — it needs a
# registry token (or crates.io Trusted Publishing) and a Cargo.toml
# version bump; releases here are tag + notes only.

on:
  push:
    branches: [main]

# Never cancel an in-flight run on main — a cancelled release job could
# leave a computed version unpublished.
concurrency:
  group: main
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  version:
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      release: ${{ steps.compute.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          # git-cliff needs full history and the release tags to
          # compute --bumped-version.
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute next version
        id: compute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Highest-semver release lookup; `gh release view` returns
          # whatever carries the Latest flag, which may not be the
          # semver ceiling. "No releases yet" leaves `last` empty.
          last=""
          gh_err=$(mktemp)
          if all_tags=$(gh release list --json tagName -q '.[].tagName' --limit 100 2>"$gh_err"); then
            last=$(printf '%s\n' "$all_tags" \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -1 \
              || true)
          else
            echo "::error::gh release list failed:"
            cat "$gh_err"
            rm -f "$gh_err"
            exit 1
          fi
          rm -f "$gh_err"

          cliff_err=$(mktemp)
          next=$(git cliff --bumped-version 2>"$cliff_err" || true)
          if [ -s "$cliff_err" ]; then
            echo "::warning::git cliff stderr:"
            sed 's/^/  /' "$cliff_err"
          fi
          rm -f "$cliff_err"
          echo "last=${last} next=${next}"

          if [ -z "$last" ]; then
            # Bootstrap policy: publish v0.1.0 by hand before CI takes
            # over auto-versioning.
            echo "::warning::no prior GitHub Release found; refusing to auto-publish — bootstrap manually with: gh release create v0.1.0 --target main --title v0.1.0"
            printf 'release=%s\n' "false" >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          elif [ -n "$next" ] && [ "$next" != "$last" ]; then
            printf 'release=%s\n' "true"  >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "$next" >> "$GITHUB_OUTPUT"
          else
            printf 'release=%s\n' "false" >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: [version]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true # cliff needs them for --unreleased
          persist-credentials: false

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          git cliff --unreleased --tag "$VERSION" --strip header > notes.md
          # The bump condition guarantees at least one feat/fix/perf
          # commit; empty notes mean a cliff.toml parser bug.
          if [ ! -s notes.md ]; then
            echo "::error::release notes were empty despite release=true; check cliff.toml commit_parsers"
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # Idempotent: a retry after a partial failure must not 422 on
          # "release already exists".
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "::notice::Release $VERSION already exists; nothing to do"
          else
            gh release create "$VERSION" \
              --target "$GITHUB_SHA" \
              --title "$VERSION" \
              --notes-file notes.md
          fi
