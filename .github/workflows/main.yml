name: main

# Post-merge pipeline:
# re-run the full test matrix and release-readiness checks on main,
# then compute the next semver from the Conventional Commits since the
# last release (git-cliff) and publish a GitHub Release when the commits
# warrant one.
#
# Bump policy (cliff.toml): breaking → major, feat → minor, fix/perf →
# patch, anything else → no release.
#
# Bootstrap: the version job refuses to auto-publish until at least one
# GitHub Release exists. crates.io has its own one-time bootstrap; see
# RELEASING.md.
#
# crates.io publishing is available via Trusted Publishing after the
# one-time bootstrap in RELEASING.md and the
# CRATES_IO_TRUSTED_PUBLISHING repository variable are in place.

on:
  push:
    branches: [main]

# Never cancel an in-flight run on main — a cancelled release job could
# leave a computed version unpublished.
concurrency:
  group: main
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # The published binary must also build without the C dependency.
      - run: cargo build -p animsmith --no-default-features

  docs-package:
    name: docs and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Rustdoc warnings are errors
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

      - name: Rustdoc warnings are errors without default CLI features
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p animsmith --no-default-features --no-deps

      - name: CLI contract tests without default features
        run: cargo test -p animsmith --test cli_contract --no-default-features

      - name: Check crate package inventories
        run: |
          set -euo pipefail
          for crate in animsmith-core animsmith-gltf animsmith-fbx animsmith-report animsmith; do
            cargo package --list -p "$crate" > "/tmp/$crate.package-list"
            test -s "/tmp/$crate.package-list"
          done

      - name: Verify publishable core crate
        run: cargo package -p animsmith-core

  version:
    needs: [test, docs-package]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      release: ${{ steps.compute.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          # git-cliff needs full history and the release tags to
          # compute --bumped-version.
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - uses: dtolnay/rust-toolchain@stable

      - name: Compute next version
        id: compute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Highest-semver release lookup; `gh release view` returns
          # whatever carries the Latest flag, which may not be the
          # semver ceiling. "No releases yet" leaves `last` empty.
          last=""
          gh_err=$(mktemp)
          if all_tags=$(gh release list --json tagName -q '.[].tagName' --limit 100 2>"$gh_err"); then
            last=$(printf '%s\n' "$all_tags" \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -1 \
              || true)
          else
            echo "::error::gh release list failed:"
            cat "$gh_err"
            rm -f "$gh_err"
            exit 1
          fi
          rm -f "$gh_err"

          cliff_err=$(mktemp)
          next=$(git cliff --bumped-version 2>"$cliff_err" || true)
          if [ -s "$cliff_err" ]; then
            echo "::warning::git cliff stderr:"
            sed 's/^/  /' "$cliff_err"
          fi
          rm -f "$cliff_err"
          crate_version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name=="animsmith") | .version')
          echo "last=${last} next=${next} cargo=v${crate_version}"

          if [ -z "$last" ]; then
            # Bootstrap policy: create the first GitHub Release by hand
            # before CI takes over auto-versioning.
            echo "::warning::no prior GitHub Release found; refusing to auto-publish — bootstrap manually at v${crate_version} or another intentional tag"
            printf 'release=%s\n' "false" >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          elif [ -n "$next" ] && [ "$next" != "$last" ]; then
            if [ "v${crate_version}" != "$next" ]; then
              echo "::warning::git-cliff computed $next, but Cargo.toml is v${crate_version}; refusing to create a release until a chore(release) PR bumps the workspace version"
              printf 'release=%s\n' "false" >> "$GITHUB_OUTPUT"
              printf 'version=%s\n' "$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
            else
              printf 'release=%s\n' "true"  >> "$GITHUB_OUTPUT"
              printf 'version=%s\n' "$next" >> "$GITHUB_OUTPUT"
            fi
          else
            printf 'release=%s\n' "false" >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: [version]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true # cliff needs them for --unreleased
          persist-credentials: false

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          git cliff --unreleased --tag "$VERSION" --strip header > notes.md
          # The bump condition guarantees at least one feat/fix/perf
          # commit; empty notes mean a cliff.toml parser bug.
          if [ ! -s notes.md ]; then
            echo "::error::release notes were empty despite release=true; check cliff.toml commit_parsers"
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # Idempotent: a retry after a partial failure must not 422 on
          # "release already exists".
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "::notice::Release $VERSION already exists; nothing to do"
          else
            gh release create "$VERSION" \
              --target "$GITHUB_SHA" \
              --title "$VERSION" \
              --notes-file notes.md
          fi

  # Publishes the workspace crates to crates.io after a GitHub Release,
  # via crates.io Trusted Publishing (GitHub OIDC — no long-lived
  # token). This job lives here rather than in an `on: release`
  # workflow because releases created with the workflow's own
  # GITHUB_TOKEN do not trigger other workflows.
  #
  # INERT UNTIL BOOTSTRAPPED (see RELEASING.md): Trusted Publishing can
  # only be configured for crates that already exist, so the first
  # publish is manual. After bootstrapping, set the repository variable
  # CRATES_IO_TRUSTED_PUBLISHING=true to arm this job.
  publish:
    needs: [version, release]
    if: needs.version.outputs.release == 'true' && vars.CRATES_IO_TRUSTED_PUBLISHING == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC hand-shake with crates.io
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish workspace crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          # The version job already requires this match before creating
          # a GitHub Release. Keep the check here too so a manual re-run
          # cannot publish a mismatched crate/tag pair.
          crate_version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name=="animsmith") | .version')
          if [ "v$crate_version" != "$VERSION" ]; then
            echo "::error::Cargo.toml version v$crate_version != release $VERSION"
            exit 1
          fi
          for crate in animsmith-core animsmith-gltf animsmith-fbx animsmith-report animsmith; do
            # Idempotent re-runs: skip versions already on the registry.
            if curl -fsS "https://crates.io/api/v1/crates/$crate/$crate_version" >/dev/null 2>&1; then
              echo "$crate $crate_version already published; skipping"
              continue
            fi
            # cargo publish blocks until the index serves the new
            # version, so sequential dependency-order publishes work.
            cargo publish -p "$crate"
          done
