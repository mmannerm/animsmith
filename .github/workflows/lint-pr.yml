name: lint-pr

# Forces every commit landing through a PR to be Conventional Commits,
# regardless of which merge method is chosen:
#
#   - Squash merge: the squash commit's subject comes from the PR title
#     (repo setting: squash_merge_commit_title=PR_TITLE). The `title`
#     job checks the PR title.
#
#   - Merge commit (the default): each individual commit on the PR
#     branch lands on main. The auto-generated `Merge pull request #N
#     from ...` commit is skipped by cliff.toml's `^Merge` parser. The
#     `commits` job checks each non-merge commit in the PR range.
#
#   - Rebase merge: disabled at the repo level — we prefer
#     cleanup-before-merge over rebase-on-merge.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: lint-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read
  contents: read

jobs:
  commits:
    name: Conventional commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          # Keep this list in lock-step with `.commitlintrc.yml`'s
          # type-enum and cliff.toml's commit_parsers.
          types: |
            feat
            fix
            perf
            revert
            chore
            ci
            docs
            style
            refactor
            test
            build
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}" did
            not match the configured pattern. Please ensure the subject
            does not start with an uppercase character.
