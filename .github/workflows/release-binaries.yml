name: release binaries

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to package.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package, for bootstrap or reruns.
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag }}

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # release-targets:start
          - os: "ubuntu-latest"
            target: "x86_64-unknown-linux-gnu"
            binary: "animsmith"
            archive_extension: "tar.gz"
            python: "python3"
          - os: "macos-14"
            target: "aarch64-apple-darwin"
            binary: "animsmith"
            archive_extension: "tar.gz"
            python: "python3"
          - os: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            binary: "animsmith.exe"
            archive_extension: "zip"
            python: "python"
          # release-targets:end
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true
          key: release-${{ matrix.target }}
      - name: Build release binary
        run: cargo build --locked -p animsmith --release --target "${{ matrix.target }}"
      - name: Package archive
        shell: bash
        env:
          ASSET_STEM: animsmith-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_extension }}
          BINARY_NAME: ${{ matrix.binary }}
          PYTHON: ${{ matrix.python }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          binary="target/${TARGET}/release/${BINARY_NAME}"
          "${binary}" --version
          "${PYTHON}" scripts/package-release-binary.py \
            --binary "${binary}" \
            --stem "${ASSET_STEM}" \
            --ext "${ARCHIVE_EXT}" \
            README.md LICENSE-APACHE LICENSE-MIT THIRD-PARTY.md
      - name: Upload packaged binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-asset-${{ matrix.target }}
          path: |
            dist/animsmith-${{ env.RELEASE_TAG }}-${{ matrix.target }}.${{ matrix.archive_extension }}
            dist/animsmith-${{ env.RELEASE_TAG }}-${{ matrix.target }}.${{ matrix.archive_extension }}.sha256
          if-no-files-found: error

  upload:
    name: upload release assets
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-asset-*
          path: dist/release-assets
          merge-multiple: true
      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -lh dist/release-assets
          gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          gh release upload "${RELEASE_TAG}" dist/release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
