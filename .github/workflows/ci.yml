name: CI

# PR gate: every merge into main goes through a pull request (branch
# protection enforces this), and this workflow is the required test
# check. Pushes to main re-run the same tests in main.yml ahead of the
# release job.

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo check --workspace --examples
      - run: cargo test --workspace
      # The published binary must also build without the C dependency.
      - run: cargo build -p animsmith --no-default-features
      - name: Build release binary
        run: cargo build -p animsmith --release
      - name: Smoke release binary
        run: cargo run -p animsmith --release -- --version
      - name: Build release binary without default features
        run: cargo build -p animsmith --release --no-default-features
      - name: Smoke release binary without default features
        run: cargo run -p animsmith --release --no-default-features -- --version

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.88
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: msrv
      - run: cargo check --workspace --all-targets

  docs-package:
    name: docs and package
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Rustdoc warnings are errors
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

      - name: Rustdoc warnings are errors without default CLI features
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p animsmith --no-default-features --no-deps

      - name: CLI contract tests without default features
        run: cargo test -p animsmith --test cli_contract --no-default-features

      - name: Check crate package inventories
        run: |
          set -euo pipefail
          for crate in animsmith-core animsmith-gltf animsmith-fbx animsmith-report animsmith; do
            cargo package --list -p "$crate" > "/tmp/$crate.package-list"
            test -s "/tmp/$crate.package-list"
          done

      - name: Verify publishable core crate
        run: cargo package -p animsmith-core
