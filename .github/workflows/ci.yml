name: CI

# PR gate: every merge into main goes through a pull request (branch
# protection enforces this), and this workflow is the required test
# check. Pushes to main re-run the same tests in main.yml ahead of the
# release job.

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
