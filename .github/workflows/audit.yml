name: audit

# Dependency vulnerability scan (RustSec advisory DB via cargo-audit).
# Runs when the dependency set changes, weekly for newly-disclosed CVEs
# against unchanged code, and on demand.

on:
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/audit.yml'
  schedule:
    # Weekly Monday 06:23 UTC; offset minute spreads cron load.
    - cron: '23 6 * * 1'
  workflow_dispatch:

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
