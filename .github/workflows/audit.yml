name: audit

# Dependency vulnerability and supply-chain policy scan.
# `cargo-audit` checks RustSec advisories; `cargo-deny` checks
# license/source policy and dependency graph drift. Runs when the
# dependency set or policy changes, weekly for newly-disclosed CVEs
# against unchanged code, and on demand.

on:
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/audit.yml'
  schedule:
    # Weekly Monday 06:23 UTC; offset minute spreads cron load.
    - cron: '23 6 * * 1'
  workflow_dispatch:

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo audit
      - run: cargo deny check
