name: release-plz

# Release automation via release-plz. Replaces the bespoke git-cliff
# version-computation + version-alignment flow removed from main.yml
# (see #37).
#
# Release automation runs these jobs on every push to main:
#   - release-pr: opens/updates a release PR that bumps the shared
#     workspace version, propagates the internal animsmith-* dependency
#     versions, and updates CHANGELOG.md (release-plz's Keep-a-Changelog format).
#   - release: once a release PR merges (the Cargo.toml version changes),
#     tags, creates the GitHub Release, and publishes all five crates to
#     crates.io in dependency order.
#   - release-binaries: when release-plz reports a release for the CLI
#     package, calls release-binaries.yml to attach CLI archives and checksums
#     to that GitHub Release.
#
# crates.io publishing uses Trusted Publishing (GitHub OIDC): the release
# job holds `id-token: write` and release-plz mints a short-lived token
# itself — no CARGO_REGISTRY_TOKEN, no third-party auth/build action in
# the publish path.
#
# BOOTSTRAP (see RELEASING.md): Trusted Publishing cannot publish a crate
# that does not yet exist, so the first 0.1.0 of each crate is published
# manually once; TP takes over for every release afterwards.
#
# CI-on-release-PR caveat: PRs opened with the default GITHUB_TOKEN do
# not trigger `on: pull_request` workflows, so the release PR will not
# get a CI run on its own. If branch protection requires CI to merge it,
# swap `secrets.GITHUB_TOKEN` in the release-pr job for a PAT or GitHub
# App token (release-plz `token` input). Deferred to bootstrap.

on:
  push:
    branches: [main]

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Post-merge test gate — also the safety re-run that used to live in
  # main.yml. Publishing waits on this.
  checks:
    permissions:
      contents: read # checkout for the reusable test matrix
    uses: ./.github/workflows/checks.yml

  release:
    name: release-plz release
    needs: [checks]
    # Inert until the one-time bootstrap arms it (see RELEASING.md). Before
    # the first manual publish + Trusted Publishing setup, an armed job would
    # try to publish the not-yet-existing 0.1.0 crates on every main push and
    # fail. Arm with: gh variable set RELEASE_PLZ_ARMED --body true
    if: ${{ vars.RELEASE_PLZ_ARMED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # push tags + create GitHub Releases
      pull-requests: read
      id-token: write # OIDC handshake with crates.io (Trusted Publishing)
    outputs:
      releases_created: ${{ steps.release_plz.outputs.releases_created }}
      release_tag: ${{ steps.release_metadata.outputs.release_tag }}
    # This job mints a crates.io token (id-token: write), so its actions are
    # SHA-pinned to remove the moving-ref exposure a tag like @stable carries.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Run release-plz
        id: release_plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Select CLI release tag
        id: release_metadata
        if: ${{ steps.release_plz.outputs.releases_created == 'true' }}
        env:
          RELEASES: ${{ steps.release_plz.outputs.releases }}
        run: |
          set -euo pipefail
          tag="$(
            jq -r '.[] | select(.package_name == "animsmith") | .tag' \
              <<<"${RELEASES}" | tail -n 1
          )"
          if [[ -z "${tag}" ]]; then
            echo "release-plz reported releases but none for the animsmith CLI package" >&2
            echo "${RELEASES}" >&2
            exit 1
          fi
          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"

  release_binaries:
    name: release binaries
    needs: [release]
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release-binaries.yml
    with:
      tag: ${{ needs.release.outputs.release_tag }}

  release-pr:
    name: release-plz release-pr
    # Also gated on the bootstrap arming variable: before the first
    # manual v0.1.0 release there is no baseline tag, so an ungated
    # release-pr would open a spurious release PR. Arming turns the whole
    # release flow on at once (see RELEASING.md).
    if: ${{ vars.RELEASE_PLZ_ARMED == 'true' }}
    runs-on: ubuntu-latest
    # Never cancel a half-written release PR.
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write # push the release branch
      pull-requests: write # open/update the release PR
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
